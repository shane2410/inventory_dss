services:
  - type: web
    name: stratix
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --noinput && gunicorn inventory_dss.wsgi:application --bind 0.0.0.0:$PORT --timeout 180
    autoDeployTrigger: commit
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,127.0.0.1,localhost
      - key: USE_DJONGO
        value: "1"
      - key: MONGO_DB_NAME
        value: inventory_db
      - key: MONGO_URI
        sync: false
